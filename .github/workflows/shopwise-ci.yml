name: Intégration Continue ShopWise

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  tests-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      
      - run: mvn clean verify jacoco:report
        working-directory: ./backend
      
      - uses: actions/upload-artifact@v4
        with:
          name: jacoco-backend-report
          path: backend/target/site/jacoco/

  tests-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend
        run: npm ci
        working-directory: ./frontend

      - name: Run Angular Tests
        run: npm run test:ci
        working-directory: ./frontend

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: angular-coverage-${{ github.run_id }}
          path: frontend/coverage/
        

  docker-build:
    runs-on: ubuntu-latest
    needs: [tests-backend, tests-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - run: docker build -t yoyoking94/shopwise-backend:latest ./backend
      - run: docker build -t yoyoking94/shopwise-frontend:latest ./frontend
      
      - run: docker push yoyoking94/shopwise-backend:latest
      - run: docker push yoyoking94/shopwise-frontend:latest

  deploy-quality:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    steps:
      - run: echo "Déploiement staging OK !"

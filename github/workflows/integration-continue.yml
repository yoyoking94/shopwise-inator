name: Intégration Continue ShopWise

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  tests-backend:
    name: Tests Backend Spring Boot
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Lancer les tests et générer le rapport JaCoCo
        run: mvn verify
        working-directory: ./backend

      - name: Publier le rapport de couverture backend
        uses: actions/upload-artifact@v4
        with:
          name: rapport-couverture-backend
          path: backend/target/site/jacoco/

  tests-frontend:
    name: Tests Frontend Angular
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install
        working-directory: ./frontend

      - name: Lancer les tests avec couverture
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
        working-directory: ./frontend

      - name: Publier le rapport de couverture frontend
        uses: actions/upload-artifact@v4
        with:
          name: rapport-couverture-frontend
          path: frontend/coverage/

  construction-docker:
    name: Construction des images Docker
    runs-on: ubuntu-latest
    needs: [ tests-backend, tests-frontend ]
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Construire l'image backend
        run: docker build -t shopwise-backend ./backend

      - name: Construire l'image frontend
        run: docker build -t shopwise-frontend ./frontend

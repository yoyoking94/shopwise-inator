<mat-card>
  <mat-card-header>
    <mat-card-title>Fidélisation du client</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="solde-points">
      <mat-icon>stars</mat-icon>
      <span class="valeur-solde">{{ soldePoints }} points</span>
    </div>

    <h3>Historique des transactions</h3>

    @if (historiqueTransactions.length === 0) {
      <p>Aucune transaction pour ce client.</p>
    } @else {
      <table mat-table [dataSource]="historiqueTransactions" class="tableau-transactions">
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let transaction">
            {{ transaction.dateTransaction | date: 'dd/MM/yyyy HH:mm' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="points">
          <th mat-header-cell *matHeaderCellDef>Points attribués</th>
          <td mat-cell *matCellDef="let transaction">+{{ transaction.pointsAttribues }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colonnesAffichees"></tr>
        <tr mat-row *matRowDef="let row; columns: colonnesAffichees"></tr>
      </table>
    }
  </mat-card-content>

  <mat-card-actions>
    <button mat-button (click)="retourVersClients()">
      <mat-icon>arrow_back</mat-icon>
      Retour aux clients
    </button>
  </mat-card-actions>
</mat-card>

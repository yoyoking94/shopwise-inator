<mat-card>
  <mat-card-header>
    <mat-card-title>Liste des clients</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="barre-actions">
      <button mat-raised-button color="primary" (click)="allerVersNouveauClient()">
        <mat-icon>add</mat-icon>
        Nouveau client
      </button>
    </div>

    <table mat-table [dataSource]="listeClients" class="tableau-clients">
      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let client">{{ client.nom }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let client">{{ client.email }}</td>
      </ng-container>

      <ng-container matColumnDef="telephone">
        <th mat-header-cell *matHeaderCellDef>Téléphone</th>
        <td mat-cell *matCellDef="let client">{{ client.telephone }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let client">
          <button
            mat-icon-button
            color="primary"
            (click)="allerVersModificationClient(client.id)"
            title="Modifier"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="accent"
            (click)="allerVersFidelisation(client.id)"
            title="Fidélisation"
          >
            <mat-icon>stars</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colonnesAffichees"></tr>
      <tr mat-row *matRowDef="let row; columns: colonnesAffichees"></tr>
    </table>
  </mat-card-content>
</mat-card>

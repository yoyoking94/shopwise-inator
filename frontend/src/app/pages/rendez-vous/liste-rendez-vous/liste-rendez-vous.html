<mat-card>
  <mat-card-header>
    <mat-card-title>Liste des rendez-vous</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="barre-actions">
      <button mat-raised-button color="primary" (click)="allerVersNouveauRendezVous()">
        <mat-icon>add</mat-icon>
        Nouveau rendez-vous
      </button>

      <mat-form-field appearance="outline">
        <mat-label>Filtrer par statut</mat-label>
        <mat-select [(ngModel)]="filtreStatut" (ngModelChange)="chargerRendezVous()">
          <mat-option value="">Tous</mat-option>
          <mat-option value="EN_ATTENTE">En attente</mat-option>
          <mat-option value="HONORE">Honoré</mat-option>
          <mat-option value="ANNULE">Annulé</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <table mat-table [dataSource]="listeRendezVous" class="tableau-rendez-vous">
      <ng-container matColumnDef="client">
        <th mat-header-cell *matHeaderCellDef>Client</th>
        <td mat-cell *matCellDef="let rdv">{{ rdv.clientId }}</td>
      </ng-container>

      <ng-container matColumnDef="date">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let rdv">{{ rdv.dateRendezVous }}</td>
      </ng-container>

      <ng-container matColumnDef="heure">
        <th mat-header-cell *matHeaderCellDef>Heure</th>
        <td mat-cell *matCellDef="let rdv">{{ rdv.heureRendezVous }}</td>
      </ng-container>

      <ng-container matColumnDef="service">
        <th mat-header-cell *matHeaderCellDef>Service</th>
        <td mat-cell *matCellDef="let rdv">{{ rdv.service }}</td>
      </ng-container>

      <ng-container matColumnDef="statut">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let rdv">
          <span [class]="'badge-statut badge-' + rdv.statut?.toLowerCase()">
            {{ rdv.statut }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let rdv">
          @if (rdv.statut === 'EN_ATTENTE') {
            <button mat-button color="primary" (click)="changerStatut(rdv.id, 'HONORE')">
              Honoré
            </button>
            <button mat-button color="warn" (click)="changerStatut(rdv.id, 'ANNULE')">
              Annulé
            </button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colonnesAffichees"></tr>
      <tr mat-row *matRowDef="let row; columns: colonnesAffichees"></tr>
    </table>
  </mat-card-content>
</mat-card>
